name: PR Validator

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-branch:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if ! echo "$BRANCH" | grep -qE '^[A-Za-z0-9]+/[a-z0-9][a-z0-9-]*$'; then
            echo "Invalid branch name: $BRANCH"
            echo "Expected format: Name/short-description (e.g. brendon/fix-task-limit)"
            echo "Rules: no accents, no special characters, lowercase after slash, hyphens only"
            exit 1
          fi

  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          COMMITS=$(git log origin/main..HEAD --no-merges --format="%s")
          if [ -z "$COMMITS" ]; then
            echo "No commits to validate."
            exit 0
          fi
          FAILED=0
          while IFS= read -r msg; do
            if [ -z "$msg" ]; then continue; fi
            if ! echo "$msg" | grep -qE '^(feat|fix|chore|test|refactor|docs|style|ci|perf|build|revert)(\(.+\))?: .+$'; then
              echo "Invalid commit message: \"$msg\""
              echo "Expected format: type: short description (e.g. fix: correct task limit)"
              FAILED=1
            fi
          done <<< "$COMMITS"
          exit $FAILED

  validate-pr-convention:
    name: Validate PR title and description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title and description
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|chore|test|refactor|docs|style|ci|perf|build|revert)(\(.+\))?: .+$'; then
            echo "Invalid PR title: \"$PR_TITLE\""
            echo "Expected format: type: short description (e.g. feat: add task filter)"
            exit 1
          fi
          echo "PR convention checks passed."

  check-sensitive-files:
    name: Check for sensitive files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect sensitive files in diff
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files to check."
            exit 0
          fi
          SENSITIVE='(\.env|\.(pem|key|p12|pfx|jks|secret|crt|cer))(\.|$)|^(id_rsa|id_ed25519|id_dsa)'
          FOUND=0
          while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi
            if echo "$file" | grep -qE "$SENSITIVE"; then
              echo "Sensitive file detected: $file"
              FOUND=1
            fi
          done <<< "$CHANGED_FILES"
          if [ "$FOUND" -eq 1 ]; then
            echo "Remove sensitive files from the commit before merging."
            exit 1
          fi
          echo "No sensitive files detected."
