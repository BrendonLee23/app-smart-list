name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.branch }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate environment variables
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          MISSING=0
          if [ -z "$NEXT_PUBLIC_API_URL" ]; then
            echo "Missing required environment variable: NEXT_PUBLIC_API_URL"
            echo "Configure this secret in GitHub repository settings."
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then exit 1; fi
          echo "Environment variables validated."

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm test -- --no-coverage

      - name: Build
        run: npm run build

      - name: Deploy
        run: echo "Deploying branch '${{ inputs.branch }}'... Configure deployment target here."
