name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.branch }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm test -- --no-coverage

      - name: Build
        run: npm run build

      - name: Deploy
        run: echo "Deploying branch '${{ inputs.branch }}'... Configure deployment target here."
